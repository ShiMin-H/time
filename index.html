<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Timetable</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Noto+Sans+TC:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════
   JAPANESE WABI-SABI PALETTE
═══════════════════════════════════ */
:root {
  --shiro:   #f5f2ec;
  --gofun:   #ede8df;
  --washi:   #e8e2d6;
  --nezumi:  #9e9b95;
  --sumi:    #3d3b37;
  --sumi2:   #6b6760;
  --kohaku:  #c9956c;
  --kurenai: #b5706a;
  --tsuchi:  #b3a48a;
  --border:  rgba(61,59,55,0.11);
  --shadow:  0 2px 16px rgba(61,59,55,0.08);
  --shadow2: 0 8px 40px rgba(61,59,55,0.14);
  --r: 10px;
  --r2: 16px;
  --nav-h: 56px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; }
body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--shiro);
  color: var(--sumi);
  min-height: 100dvh;
  overflow-x: hidden;
}

/* ═══════════════════════════════════
   PAGE SYSTEM
═══════════════════════════════════ */
.page {
  display: none;
  min-height: 100dvh;
  flex-direction: column;
}
.page.active { display: flex; }

/* ═══════════════════════════════════
   NAV
═══════════════════════════════════ */
.nav {
  position: sticky; top: 0; z-index: 50;
  height: var(--nav-h);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px;
  background: rgba(245,242,236,0.45);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(61,59,55,0.07);
  gap: 10px;
  flex-shrink: 0;
}

.nav-title-wrap {
  display: flex; align-items: center; gap: 6px;
  flex: 1; min-width: 0;
}
.nav-title {
  font-family: 'Noto Serif TC', serif;
  font-size: clamp(0.9rem, 2.5vw, 1.15rem);
  font-weight: 600; letter-spacing: 0.06em;
  color: var(--sumi);
  cursor: pointer; border-radius: 6px;
  padding: 3px 7px;
  transition: background 0.15s;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 180px;
}
.nav-title:hover { background: var(--washi); }
.nav-title-edit-btn {
  font-size: 0.65rem; color: var(--nezumi); cursor: pointer;
  padding: 3px; border-radius: 4px; flex-shrink: 0;
  transition: color 0.15s;
}
.nav-title-edit-btn:hover { color: var(--kohaku); }

.nav-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }

.btn {
  padding: 7px 14px; border-radius: 30px;
  border: 1px solid var(--border);
  background: transparent;
  font-size: clamp(0.68rem, 1.5vw, 0.76rem);
  font-family: 'Noto Sans TC', sans-serif;
  color: var(--sumi2); cursor: pointer;
  transition: all 0.18s; white-space: nowrap;
  display: inline-flex; align-items: center; gap: 4px;
}
.btn:hover { background: var(--washi); color: var(--sumi); }
.btn.primary { background: var(--sumi); color: var(--shiro); border-color: var(--sumi); }
.btn.primary:hover { background: var(--sumi2); }
.btn.orange { background: var(--kohaku); color: #fff; border-color: var(--kohaku); }
.btn.orange:hover { background: #b5845a; }

/* ═══════════════════════════════════
   MAIN PAGE BODY
═══════════════════════════════════ */
.main-body {
  flex: 1;
  padding: 16px;
  display: flex; flex-direction: column; gap: 16px;
  max-width: 1100px; width: 100%; margin: 0 auto;
}

.week-strip {
  display: flex; gap: 6px; overflow-x: auto;
  padding-bottom: 2px; flex-shrink: 0;
}
.week-strip::-webkit-scrollbar { display: none; }
.week-chip {
  flex-shrink: 0;
  padding: 5px 14px; border-radius: 20px;
  font-size: 0.73rem; border: 1px solid var(--border);
  background: transparent; color: var(--nezumi);
  transition: all 0.15s; cursor: default;
  font-family: 'Noto Sans TC', sans-serif;
}
.week-chip.today { 
  background: var(--tsuchi); 
  color: var(--shiro); 
  border-color: var(--tsuchi); 
  opacity: 0.9;
}
.today-dot {
  display: inline-block; width: 5px; height: 5px;
  background: var(--kohaku); border-radius: 50%; margin-left: 4px;
  vertical-align: middle;
}

.tt-card {
  background: rgba(255,255,255,0.42);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-radius: var(--r2);
  border: 1px solid rgba(255,255,255,0.5);
  overflow: hidden;
  box-shadow: var(--shadow);
}
.tt-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table.tt {
  width: 100%; border-collapse: separate; border-spacing: 3px;
  min-width: 420px; padding: 8px;
}
table.tt th {
  font-size: clamp(0.6rem, 1.5vw, 0.7rem);
  font-weight: 500; text-align: center;
  padding: 6px 2px; color: var(--nezumi);
  letter-spacing: 0.06em;
  font-family: 'Noto Serif TC', serif;
}
table.tt th.th-time { width: 48px; }
.time-cell {
  text-align: right; padding-right: 8px;
  vertical-align: top; padding-top: 8px;
  white-space: nowrap;
}
.t-period {
  font-family: 'DM Mono', monospace;
  font-size: clamp(0.55rem, 1.2vw, 0.62rem);
  color: var(--nezumi); display: block;
}
.t-time {
  font-family: 'DM Mono', monospace;
  font-size: clamp(0.5rem, 1.1vw, 0.57rem);
  color: var(--tsuchi); display: block; margin-top: 1px;
}
table.tt td.slot {
  height: clamp(52px, 8vw, 66px);
  border-radius: var(--r);
  border: 1.5px dashed rgba(61,59,55,0.13);
  background: rgba(232,226,214,0.28);
  vertical-align: middle; text-align: center;
  cursor: pointer; transition: all 0.18s;
  position: relative;
  min-width: clamp(60px, 12vw, 88px);
}
table.tt td.slot.empty:hover,
table.tt td.slot.empty.pick-mode {
  border-color: var(--kohaku);
  background: rgba(201,149,108,0.10);
}
table.tt td.slot.empty.pick-mode {
  animation: pulse 1.2s infinite;
}
@keyframes pulse {
  0%,100% { background: rgba(201,149,108,0.08); }
  50% { background: rgba(201,149,108,0.18); }
}
table.tt td.slot.filled { border: none; cursor: default; }
table.tt td.slot.drag-over {
  border-color: var(--kohaku) !important;
  background: rgba(201,149,108,0.15) !important;
  transform: scale(0.95);
}
.slot-inner {
  width: 100%; height: 100%;
  border-radius: calc(var(--r) - 1px);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 1px; padding: 4px 3px;
  position: relative; overflow: hidden;
}
.slot-inner::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg,rgba(255,255,255,0.2) 0%,transparent 55%);
  pointer-events: none;
}
.slot-name {
  font-size: clamp(0.65rem, 1.6vw, 0.78rem);
  font-weight: 600; line-height: 1.2; text-align: center;
  font-family: 'Noto Serif TC', serif;
}
.slot-room {
  font-size: clamp(0.52rem, 1.1vw, 0.6rem);
  opacity: 0.72; font-family: 'DM Mono', monospace;
}
.slot-time-tag {
  font-size: clamp(0.48rem, 1vw, 0.55rem);
  opacity: 0.6; font-family: 'DM Mono', monospace;
}
.slot-del {
  position: absolute; top: 3px; right: 3px;
  width: 14px; height: 14px; border-radius: 50%;
  background: rgba(0,0,0,0.2); border: none;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.48rem; color: #fff;
  opacity: 0; transition: opacity 0.15s;
  cursor: pointer; z-index: 2;
}
.slot-inner:hover .slot-del { opacity: 1; }
.slot-plus { font-size: 0.9rem; color: rgba(61,59,55,0.16); pointer-events: none; }

/* UNSCHEDULED POOL */
.unscheduled-section {
  background: rgba(255,255,255,0.42);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-radius: var(--r2);
  border: 1px solid rgba(255,255,255,0.5);
  padding: 14px 16px;
  box-shadow: var(--shadow);
}
.section-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 0.78rem; font-weight: 600;
  letter-spacing: 0.08em; color: var(--sumi2);
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}
.section-title .s-count {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem; color: var(--nezumi);
  background: var(--washi); padding: 1px 7px;
  border-radius: 10px;
}
.unscheduled-grid {
  display: flex; flex-wrap: wrap; gap: 7px;
}
.unsched-chip {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 12px; border-radius: 9px;
  font-size: clamp(0.72rem, 1.5vw, 0.8rem);
  cursor: pointer; transition: all 0.18s;
  border: 1.5px solid transparent;
  user-select: none;
  font-family: 'Noto Serif TC', serif;
  font-weight: 500;
}
.unsched-chip:hover { transform: translateY(-2px); box-shadow: var(--shadow2); filter: brightness(1.06); }
.unsched-chip.selected {
  outline: 2.5px solid var(--sumi);
  transform: scale(0.97);
}
.export-bar {
  padding: 12px 16px;
  background: var(--gofun);
  border-radius: var(--r2);
  border: 1px solid var(--border);
  display: flex; align-items: center;
  justify-content: space-between; flex-wrap: wrap; gap: 8px;
}

/* SETTINGS */
#page-settings { background: var(--gofun); }
.settings-body {
  flex: 1; padding: 16px;
  display: flex; flex-direction: column; gap: 14px;
  max-width: 860px; width: 100%; margin: 0 auto;
}
.settings-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
@media(max-width: 600px) {
  .settings-grid { grid-template-columns: 1fr; }
}
.card {
  background: rgba(245,242,236,0.82);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: var(--r2);
  border: 1px solid var(--border);
  padding: 16px; box-shadow: var(--shadow);
}
.card-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 0.82rem; font-weight: 600;
  letter-spacing: 0.08em; color: var(--sumi);
  margin-bottom: 12px;
  padding-bottom: 9px;
  border-bottom: 1px solid var(--border);
}
.pool-chip {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 11px; border-radius: 9px;
  font-size: 0.78rem; cursor: grab;
  user-select: none; transition: all 0.15s;
}
.add-form input, .add-form select {
  padding: 9px 11px; border-radius: 9px;
  border: 1.5px solid var(--border);
  background: var(--gofun); font-size: 0.78rem;
  font-family: 'Noto Sans TC', sans-serif;
  color: var(--sumi); outline: none;
  transition: border 0.15s; width: 100%;
}

/* MODAL */
.modal-mask {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(40,38,35,0.42); backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
  opacity: 0; pointer-events: none; transition: opacity 0.22s;
}
.modal-mask.open { opacity: 1; pointer-events: all; }
.modal-box {
  background: var(--shiro); border-radius: var(--r2);
  padding: 22px; width: 100%; max-width: 320px;
  box-shadow: var(--shadow2);
  transform: translateY(14px) scale(0.97);
  transition: transform 0.22s;
  border: 1px solid var(--border);
}
.modal-mask.open .modal-box { transform: none; }

/* TOAST */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--sumi); color: var(--shiro);
  padding: 9px 20px; border-radius: 30px;
  font-size: 0.75rem; z-index: 300;
  transition: transform 0.28s cubic-bezier(.34,1.56,.64,1);
  pointer-events: none;
  font-family: 'Noto Serif TC', serif;
}
.toast.show { transform: translateX(-50%) translateY(0); }

#bg-layer { position: fixed; inset: 0; z-index: -2; background-size: cover; background-position: center; transition: all 0.7s ease; }
#bg-overlay { position: fixed; inset: 0; z-index: -1; transition: background 0.5s; pointer-events: none; }
body { background: transparent; }
.page { position: relative; z-index: 1; }

.view-only-bar {
  position:sticky; top:var(--nav-h); z-index:45;
  background:rgba(181,112,106,0.85); backdrop-filter:blur(10px);
  color:#fff; text-align:center; font-size:0.75rem;
  padding:7px 16px; display:none;
}
.view-only-bar.show { display:block; }
</style>
</head>
<body>

<div id="bg-layer"></div>
<div id="bg-overlay"></div>

<div class="page active" id="page-main">
  <nav class="nav">
    <div class="nav-title-wrap">
      <div class="nav-title" id="navTitle" onclick="editTitle()">時間割</div>
      <span class="nav-title-edit-btn" onclick="editTitle()">✎</span>
    </div>
    <div class="nav-actions">
      <button class="btn" id="syncBtn" onclick="openShareModal()">🔗</button>
      <button class="btn" onclick="exportPNG()">↓ 匯出</button>
      <button class="btn orange" onclick="goSettings()">⚙ 編輯</button>
    </div>
  </nav>

  <div class="view-only-bar" id="viewOnlyBar">👁 瀏覽模式 — 你的變更不會儲存</div>
  <div class="main-body">
    <div class="week-strip" id="weekStrip"></div>
    <div class="tt-card">
      <div class="tt-scroll" id="ttExportTarget">
        <table class="tt" id="ttTable"></table>
      </div>
    </div>
    <div class="unscheduled-section" id="unschedSection">
      <div class="section-title">待安排課程 <span class="s-count" id="unschedCount">0</span></div>
      <div class="unscheduled-grid" id="unschedGrid"></div>
    </div>
  </div>
</div>

<div class="page" id="page-settings">
  <nav class="nav">
    <div class="nav-title-wrap"><div class="nav-title">設定</div></div>
    <div class="nav-actions"><button class="btn primary" onclick="goMain()">← 返回</button></div>
  </nav>
  <div class="settings-body">
    <div class="card">
      <div class="card-title">📚 課程庫</div>
      <div class="pool-list" id="coursePool"></div>
      <div class="add-form">
        <input id="inName" placeholder="課程名稱" maxlength="20">
        <input id="inRoom" placeholder="教室 (選填)" maxlength="16" style="margin-top:8px">
        <button class="btn primary" style="margin-top:8px; width:100%; justify-content:center" onclick="addCourse()">＋ 新增課程</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-mask" id="modal">
  <div class="modal-box">
    <h3 id="mTitle">放入課程</h3>
    <input id="mName" placeholder="名稱" style="margin-top:10px">
    <div class="modal-btns" style="margin-top:10px; display:flex; gap:8px">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn primary" onclick="confirmModal()">確認</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, serverTimestamp } 
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const FB_CONFIG = {
  apiKey: "AIzaSyBhjVt2giNtI0I0Xg7Op38m6aOxT7scQ_4",
  authDomain: "timetable-f67f7.firebaseapp.com",
  projectId: "timetable-f67f7",
  storageBucket: "timetable-f67f7.firebasestorage.app",
  messagingSenderId: "1002358831228",
  appId: "1:1002358831228:web:c5ef0f1a7a2afef8d571f9",
  measurementId: "G-9HZT4TC7XF"
};

let db;
async function fbInit() {
  try {
    const app = initializeApp(FB_CONFIG);
    db = getFirestore(app);
    window._fbReady = true;
    document.dispatchEvent(new Event('fb-ready'));
  } catch(e) { console.warn('Firebase failed'); }
}

window._fbSave = async function(data) {
  const id = window._myDocId;
  if (!db || !id) return;
  try {
    await setDoc(doc(db, 'timetables', id), { ...data, updatedAt: serverTimestamp() });
  } catch(e) { console.error('Save failed', e); }
};

window._fbLoad = async function(id) {
  if (!db) return null;
  const snap = await getDoc(doc(db, 'timetables', id));
  return snap.exists() ? snap.data() : null;
};

window._fbCreate = async function(data) {
  if (!db) return null;
  const ref = await addDoc(collection(db, 'timetables'), { ...data, createdAt: serverTimestamp() });
  return ref.id;
};

fbInit();
</script>

<script>
const DAYS_ALL = ['一','二','三','四','五','六','日'];
let activeDays = [0,1,2,3,4], timeSlots = [{start:'08:00',end:'08:50'},{start:'09:00',end:'09:50'}], courses = [], schedule = {}, appTitle = '時間割';

function renderMain() { renderWeekStrip(); renderTT(); renderUnscheduled(); }

function renderWeekStrip() {
  const strip = document.getElementById('weekStrip'), raw = new Date().getDay();
  const todayIdx = raw === 0 ? 6 : raw - 1;
  strip.innerHTML = '';
  activeDays.forEach(di => {
    const chip = document.createElement('div');
    chip.className = 'week-chip' + (di === todayIdx ? ' today' : '');
    chip.innerHTML = `週${DAYS_ALL[di]}${di === todayIdx ? '<span class="today-dot"></span>' : ''}`;
    strip.appendChild(chip);
  });
}

function renderTT() {
  const table = document.getElementById('ttTable'), raw = new Date().getDay(), todayIdx = raw === 0 ? 6 : raw - 1;
  let html = '<thead><tr><th class="th-time"></th>';
  activeDays.forEach(di => html += `<th>週${DAYS_ALL[di]}</th>`);
  html += '</tr></thead><tbody>';
  timeSlots.forEach((ts, si) => {
    html += `<tr><td class="time-cell"><span class="t-period">${si+1}</span></td>`;
    activeDays.forEach(di => {
      const key = `${di}-${si}`, entry = schedule[key];
      if (entry) {
        html += `<td class="slot filled" style="background:${entry.colorHex || '#c8b89a'}">
          <div class="slot-inner"><span class="slot-name">${entry.name}</span><button class="slot-del" onclick="removeSlot('${key}')">✕</button></div></td>`;
      } else {
        html += `<td class="slot empty" onclick="slotClick(${di},${si})">＋</td>`;
      }
    });
    html += '</tr>';
  });
  table.innerHTML = html + '</tbody>';
  if (window._fbReady) scheduleSave();
}

function slotClick(di, si) { 
  const name = prompt("輸入課程名稱:"); 
  if(name) { schedule[`${di}-${si}`] = {name, colorHex: '#a8becc'}; renderTT(); }
}
function removeSlot(key) { delete schedule[key]; renderTT(); }
function renderUnscheduled() { document.getElementById('unschedCount').textContent = Object.keys(schedule).length; }
function goSettings() { document.getElementById('page-main').classList.remove('active'); document.getElementById('page-settings').classList.add('active'); }
function goMain() { document.getElementById('page-settings').classList.remove('active'); document.getElementById('page-main').classList.add('active'); }

let _saveTimer;
function scheduleSave() {
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => {
    if(window._fbSave && window._myDocId) window._fbSave({schedule, appTitle, activeDays});
  }, 1000);
}

async function boot() {
  const params = new URLSearchParams(location.search);
  const sharedId = params.get('t');
  if (sharedId) {
    document.addEventListener('fb-ready', async () => {
      const data = await window._fbLoad(sharedId);
      if (data) { schedule = data.schedule; appTitle = data.appTitle; window._myDocId = sharedId; renderMain(); }
    }, {once:true});
  } else {
    document.addEventListener('fb-ready', async () => {
      window._myDocId = await window._fbCreate({schedule, appTitle});
      renderMain();
    }, {once:true});
  }
}
boot();
</script>
</body>
</html>
