<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>時間割</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=Noto+Sans+TC:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════
   JAPANESE WABI-SABI PALETTE
═══════════════════════════════════ */
:root {
  --shiro:   #f5f2ec;
  --gofun:   #ede8df;
  --washi:   #e8e2d6;
  --nezumi:  #9e9b95;
  --sumi:    #3d3b37;
  --sumi2:   #6b6760;
  --kohaku:  #c9956c;
  --kurenai: #b5706a;
  --tsuchi:  #b3a48a;
  --border:  rgba(61,59,55,0.11);
  --shadow:  0 2px 16px rgba(61,59,55,0.08);
  --shadow2: 0 8px 40px rgba(61,59,55,0.14);
  --r: 10px;
  --r2: 16px;
  --nav-h: 56px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
font-family: ‘Noto Sans TC’, sans-serif;
background: var(–shiro);
color: var(–sumi);
min-height: 100dvh;
overflow-x: hidden;
}
/* ═══════════════════════════════════
PAGE SYSTEM
═══════════════════════════════════ */
.page {
display: none;
min-height: 100dvh;
flex-direction: column;
}
.page.active { display: flex; }
/* ═══════════════════════════════════
NAV
═══════════════════════════════════ */
.nav {
position: sticky; top: 0; z-index: 50;
height: var(–nav-h);
display: flex; align-items: center; justify-content: space-between;
padding: 0 16px;
background: rgba(245,242,236,0.45);
backdrop-filter: blur(20px);
-webkit-backdrop-filter: blur(20px);
border-bottom: 1px solid rgba(61,59,55,0.07);
gap: 10px;
flex-shrink: 0;
}
/* editable title */
.nav-title-wrap {
display: flex; align-items: center; gap: 6px;
flex: 1; min-width: 0;
}
.nav-title {
font-family: ‘Noto Serif TC’, serif;
font-size: clamp(0.9rem, 2.5vw, 1.15rem);
font-weight: 600; letter-spacing: 0.06em;
color: var(–sumi);
cursor: pointer; border-radius: 6px;
padding: 3px 7px;
transition: background 0.15s;
white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
max-width: 180px;
}
.nav-title:hover { background: var(–washi); }
.nav-title-edit-btn {
font-size: 0.65rem; color: var(–nezumi); cursor: pointer;
padding: 3px; border-radius: 4px; flex-shrink: 0;
transition: color 0.15s;
}
.nav-title-edit-btn:hover { color: var(–kohaku); }
.nav-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
.btn {
padding: 7px 14px; border-radius: 30px;
border: 1px solid var(–border);
background: transparent;
font-size: clamp(0.68rem, 1.5vw, 0.76rem);
font-family: ‘Noto Sans TC’, sans-serif;
color: var(–sumi2); cursor: pointer;
transition: all 0.18s; white-space: nowrap;
display: inline-flex; align-items: center; gap: 4px;
}
.btn:hover { background: var(–washi); color: var(–sumi); }
.btn.primary { background: var(–sumi); color: var(–shiro); border-color: var(–sumi); }
.btn.primary:hover { background: var(–sumi2); }
.btn.orange { background: var(–kohaku); color: #fff; border-color: var(–kohaku); }
.btn.orange:hover { background: #b5845a; }
/* ═══════════════════════════════════
MAIN PAGE BODY
═══════════════════════════════════ */
.main-body {
flex: 1;
padding: 16px;
display: flex; flex-direction: column; gap: 16px;
max-width: 1100px; width: 100%; margin: 0 auto;
}
/* week strip */
.week-strip {
display: flex; gap: 6px; overflow-x: auto;
padding-bottom: 2px; flex-shrink: 0;
}
.week-strip::-webkit-scrollbar { display: none; }
.week-chip {
flex-shrink: 0;
padding: 5px 14px; border-radius: 20px;
font-size: 0.73rem; border: 1px solid var(–border);
background: transparent; color: var(–nezumi);
transition: all 0.15s; cursor: default;
font-family: ‘Noto Sans TC’, sans-serif;
}
.week-chip.today { background: var(–sumi); color: var(–shiro); border-color: var(–sumi); }
.today-dot {
display: inline-block; width: 5px; height: 5px;
background: var(–kohaku); border-radius: 50; margin-left: 4px;
vertical-align: middle; border-radius: 50%;
}
/* If --sumi is missing, use black as a backup */
background: var(--sumi, #55565A); 
}
/* timetable */
.tt-card {
background: rgba(255,255,255,0.42);
backdrop-filter: blur(14px);
-webkit-backdrop-filter: blur(14px);
border-radius: var(–r2);
border: 1px solid rgba(255,255,255,0.5);
overflow: hidden;
box-shadow: var(–shadow);
}
.tt-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table.tt {
width: 100%; border-collapse: separate; border-spacing: 3px;
min-width: 420px; padding: 8px;
}
table.tt th {
font-size: clamp(0.6rem, 1.5vw, 0.7rem);
font-weight: 500; text-align: center;
padding: 6px 2px; color: var(–nezumi);
letter-spacing: 0.06em;
font-family: ‘Noto Serif TC’, serif;
}
table.tt th.th-time { width: 48px; }
.time-cell {
text-align: right; padding-right: 8px;
vertical-align: top; padding-top: 8px;
white-space: nowrap;
}
.t-period {
font-family: ‘DM Mono’, monospace;
font-size: clamp(0.55rem, 1.2vw, 0.62rem);
color: var(–nezumi); display: block;
}
.t-time {
font-family: ‘DM Mono’, monospace;
font-size: clamp(0.5rem, 1.1vw, 0.57rem);
color: var(–tsuchi); display: block; margin-top: 1px;
}
table.tt td.slot {
height: clamp(52px, 8vw, 66px);
border-radius: var(–r);
border: 1.5px dashed rgba(61,59,55,0.13);
background: rgba(232,226,214,0.28);
vertical-align: middle; text-align: center;
cursor: pointer; transition: all 0.18s;
position: relative;
min-width: clamp(60px, 12vw, 88px);
}
table.tt td.slot.empty:hover,
table.tt td.slot.empty.pick-mode {
border-color: var(–kohaku);
background: rgba(201,149,108,0.10);
}
table.tt td.slot.empty.pick-mode {
animation: pulse 1.2s infinite;
}
@keyframes pulse {
0%,100% { background: rgba(201,149,108,0.08); }
50% { background: rgba(201,149,108,0.18); }
}
table.tt td.slot.filled { border: none; cursor: default; }
table.tt td.slot.drag-over {
border-color: var(–kohaku) !important;
background: rgba(201,149,108,0.15) !important;
transform: scale(0.95);
}
.slot-inner {
width: 100%; height: 100%;
border-radius: calc(var(–r) - 1px);
display: flex; flex-direction: column;
align-items: center; justify-content: center;
gap: 1px; padding: 4px 3px;
position: relative; overflow: hidden;
}
.slot-inner::after {
content: ‘’; position: absolute; inset: 0;
background: linear-gradient(135deg,rgba(255,255,255,0.2) 0%,transparent 55%);
pointer-events: none;
}
.slot-name {
font-size: clamp(0.65rem, 1.6vw, 0.78rem);
font-weight: 600; line-height: 1.2; text-align: center;
font-family: ‘Noto Serif TC’, serif;
}
.slot-room {
font-size: clamp(0.52rem, 1.1vw, 0.6rem);
opacity: 0.72; font-family: ‘DM Mono’, monospace;
}
.slot-time-tag {
font-size: clamp(0.48rem, 1vw, 0.55rem);
opacity: 0.6; font-family: ‘DM Mono’, monospace;
}
.slot-del {
position: absolute; top: 3px; right: 3px;
width: 14px; height: 14px; border-radius: 50%;
background: rgba(0,0,0,0.2); border: none;
display: flex; align-items: center; justify-content: center;
font-size: 0.48rem; color: #fff;
opacity: 0; transition: opacity 0.15s;
cursor: pointer; z-index: 2;
}
.slot-inner:hover .slot-del { opacity: 1; }
.slot-plus { font-size: 0.9rem; color: rgba(61,59,55,0.16); pointer-events: none; }
/* ═══════════════════════════════════
UNSCHEDULED POOL (main page)
═══════════════════════════════════ */
.unscheduled-section {
background: rgba(255,255,255,0.42);
backdrop-filter: blur(14px);
-webkit-backdrop-filter: blur(14px);
border-radius: var(–r2);
border: 1px solid rgba(255,255,255,0.5);
padding: 14px 16px;
box-shadow: var(–shadow);
}
.section-title {
font-family: ‘Noto Serif TC’, serif;
font-size: 0.78rem; font-weight: 600;
letter-spacing: 0.08em; color: var(–sumi2);
margin-bottom: 10px;
display: flex; align-items: center; gap: 6px;
}
.section-title .s-count {
font-family: ‘DM Mono’, monospace;
font-size: 0.65rem; color: var(–nezumi);
background: var(–washi); padding: 1px 7px;
border-radius: 10px;
}
.unscheduled-grid {
display: flex; flex-wrap: wrap; gap: 7px;
}
.unsched-chip {
display: flex; align-items: center; gap: 6px;
padding: 8px 12px; border-radius: 9px;
font-size: clamp(0.72rem, 1.5vw, 0.8rem);
cursor: pointer; transition: all 0.18s;
border: 1.5px solid transparent;
user-select: none;
font-family: ‘Noto Serif TC’, serif;
font-weight: 500;
}
.unsched-chip:hover { transform: translateY(-2px); box-shadow: var(–shadow2); filter: brightness(1.06); }
.unsched-chip:active { transform: scale(0.96); }
.unsched-chip.selected {
outline: 2.5px solid var(–sumi);
transform: scale(0.97);
}
.unsched-chip .chip-count {
font-family: ‘DM Mono’, monospace;
font-size: 0.6rem; opacity: 0.7;
background: rgba(0,0,0,0.1); padding: 1px 5px;
border-radius: 8px;
}
.unsched-empty {
font-size: 0.75rem; color: var(–nezumi);
font-style: italic; padding: 4px 0;
}
/* export bar */
.export-bar {
padding: 12px 16px;
background: var(–gofun);
border-radius: var(–r2);
border: 1px solid var(–border);
display: flex; align-items: center;
justify-content: space-between; flex-wrap: wrap; gap: 8px;
}
.export-bar span {
font-size: 0.75rem; color: var(–sumi2);
font-family: ‘Noto Serif TC’, serif;
}
/* pick-mode banner */
.pick-banner {
display: none;
position: sticky; bottom: 12px;
margin: 0 16px;
background: var(–sumi);
color: var(–shiro);
border-radius: 30px;
padding: 11px 20px;
font-size: 0.78rem;
font-family: ‘Noto Serif TC’, serif;
letter-spacing: 0.04em;
text-align: center;
box-shadow: var(–shadow2);
z-index: 40;
animation: slideUp 0.25s ease;
cursor: pointer;
}
.pick-banner.show { display: block; }
@keyframes slideUp {
from { transform: translateY(20px); opacity: 0; }
to { transform: none; opacity: 1; }
}
/* ═══════════════════════════════════
SETTINGS PAGE
═══════════════════════════════════ */
#page-settings { background: var(–gofun); }
#page-settings .nav { background: rgba(237,232,223,0.45); }
.settings-body {
flex: 1; padding: 16px;
display: flex; flex-direction: column; gap: 14px;
max-width: 860px; width: 100%; margin: 0 auto;
}
/* two-col on tablet+ */
.settings-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 14px;
}
@media(max-width: 600px) {
.settings-grid { grid-template-columns: 1fr; }
}
.card {
background: rgba(245,242,236,0.82);
backdrop-filter: blur(12px);
-webkit-backdrop-filter: blur(12px);
border-radius: var(–r2);
border: 1px solid var(–border);
padding: 16px; box-shadow: var(–shadow);
}
.card-title {
font-family: ‘Noto Serif TC’, serif;
font-size: 0.82rem; font-weight: 600;
letter-spacing: 0.08em; color: var(–sumi);
margin-bottom: 12px;
padding-bottom: 9px;
border-bottom: 1px solid var(–border);
}
/* course pool in settings */
.pool-list { display: flex; flex-direction: column; gap: 6px; }
.pool-chip {
display: flex; align-items: center; gap: 8px;
padding: 9px 11px; border-radius: 9px;
font-size: 0.78rem; cursor: grab;
user-select: none; transition: all 0.15s;
}
.pool-chip:hover { transform: translateX(3px); box-shadow: var(–shadow); }
.pool-chip:active { cursor: grabbing; }
.pool-chip.dragging { opacity: 0.35; }
.c-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: rgba(255,255,255,0.55); }
.c-name { font-weight: 500; flex: 1; font-family: ‘Noto Serif TC’, serif; }
.c-room { font-size: 0.65rem; font-family: ‘DM Mono’, monospace; opacity: 0.7; }
.c-sessions {
font-family: ‘DM Mono’, monospace;
font-size: 0.62rem; opacity: 0.75;
background: rgba(0,0,0,0.1); padding: 1px 6px; border-radius: 8px;
}
.c-del {
width: 18px; height: 18px; border-radius: 50%;
background: rgba(0,0,0,0.13); border: none;
display: flex; align-items: center; justify-content: center;
font-size: 0.55rem; color: #fff; cursor: pointer;
opacity: 0; transition: opacity 0.15s;
}
.pool-chip:hover .c-del { opacity: 1; }
/* add course form */
.add-form { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
.add-form input, .add-form select {
padding: 9px 11px; border-radius: 9px;
border: 1.5px solid var(–border);
background: var(–gofun); font-size: 0.78rem;
font-family: ‘Noto Sans TC’, sans-serif;
color: var(–sumi); outline: none;
transition: border 0.15s; width: 100%;
}
.add-form input:focus { border-color: var(–kohaku); background: #fff; }
.add-form input::placeholder { color: var(–nezumi); }
.form-row { display: flex; gap: 8px; }
.form-row input { flex: 1; }
.sessions-row {
display: flex; align-items: center; gap: 8px;
font-size: 0.75rem; color: var(–sumi2);
}
.sessions-row label { flex-shrink: 0; }
.sessions-row input[type=number] {
width: 64px; text-align: center; flex: none;
padding: 7px 8px;
}
/* jp color swatches */
.color-pick-row {
display: flex; align-items: center; gap: 8px;
flex-wrap: wrap; margin-top: 2px;
}
.color-pick-row input[type=color] {
width: 32px; height: 32px; border-radius: 50%;
border: 2px solid var(–border); padding: 1px;
cursor: pointer; background: none; flex-shrink: 0;
}
.jp-colors { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
.jp-swatch {
width: 24px; height: 24px; border-radius: 50%;
cursor: pointer; border: 2px solid transparent;
transition: all 0.15s; position: relative;
flex-shrink: 0;
}
.jp-swatch:hover { transform: scale(1.2); }
.jp-swatch.sel { border-color: var(–sumi); transform: scale(1.15); }
.jp-swatch.sel::after {
content: ‘✓’; position: absolute; inset: 0;
display: flex; align-items: center; justify-content: center;
font-size: 0.5rem; color: rgba(0,0,0,0.45);
}
/* time slots */
.time-slots-list { display: flex; flex-direction: column; gap: 5px; }
.time-row {
display: flex; align-items: center; gap: 6px;
padding: 7px 10px; border-radius: 9px;
background: var(–gofun); border: 1px solid var(–border);
}
.tr-period {
font-family: ‘DM Mono’, monospace; font-size: 0.62rem;
color: var(–nezumi); width: 18px; text-align: center; flex-shrink: 0;
}
.time-row input[type=time] {
padding: 3px 6px; border-radius: 6px;
border: 1px solid var(–border); background: #fff;
font-family: ‘DM Mono’, monospace; font-size: 0.7rem;
color: var(–sumi); outline: none; cursor: pointer;
flex: 1; min-width: 0;
}
.time-row input[type=time]:focus { border-color: var(–kohaku); }
.tr-sep { color: var(–nezumi); font-size: 0.68rem; flex-shrink: 0; }
.tr-del {
width: 18px; height: 18px; border-radius: 50%;
background: var(–border); border: none;
display: flex; align-items: center; justify-content: center;
font-size: 0.52rem; color: var(–sumi2); cursor: pointer;
flex-shrink: 0; transition: background 0.15s;
}
.tr-del:hover { background: var(–kurenai); color: #fff; }
.time-add-btn {
margin-top: 6px; padding: 7px; border-radius: 9px;
border: 1.5px dashed var(–border); background: transparent;
font-size: 0.72rem; color: var(–nezumi); cursor: pointer;
width: 100%; font-family: ‘Noto Sans TC’, sans-serif;
transition: all 0.15s;
}
.time-add-btn:hover { border-color: var(–kohaku); color: var(–kohaku); }
/* day toggle */
.toggle-row { display: flex; flex-wrap: wrap; gap: 6px; }
.toggle-chip {
padding: 6px 13px; border-radius: 20px;
border: 1.5px solid var(–border); background: var(–gofun);
font-size: 0.72rem; cursor: pointer; color: var(–sumi2);
font-family: ‘Noto Sans TC’, sans-serif; transition: all 0.18s;
font-weight: 400;
}
.toggle-chip:hover { background: var(–washi); border-color: var(–nezumi); }
.toggle-chip.on {
background: var(–sumi); color: var(–shiro);
border-color: var(–sumi); font-weight: 500;
box-shadow: 0 2px 8px rgba(61,59,55,0.25);
}
/* today column */
.th-today { position: relative; }
.today-pill {
display: inline-flex; align-items: center;
background: var(–kohaku); color: #50634F;
border-radius: 20px; padding: 3px 10px;
font-size: 0.68rem; font-weight: 600;
letter-spacing: 0.06em;
font-family: ‘Noto Serif TC’, serif;
box-shadow: 0 2px 8px rgba(201,149,108,0.4);
}
/* bg grid */
.bg-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
gap: 7px;
}
.bg-thumb {
aspect-ratio: 3/2; border-radius: 9px; cursor: pointer;
overflow: hidden; border: 2.5px solid transparent;
transition: all 0.18s; position: relative;
background-size: cover; background-position: center;
}
.bg-thumb:hover { transform: scale(1.04); }
.bg-thumb.on { border-color: var(–kohaku); }
.bg-name {
position: absolute; bottom: 0; left: 0; right: 0;
background: linear-gradient(transparent, rgba(0,0,0,0.5));
color: #fff; font-size: 0.58rem; padding: 3px 4px 2px;
font-family: ‘Noto Serif TC’, serif;
}
.bg-upload-slot {
aspect-ratio: 3/2; border-radius: 9px; cursor: pointer;
border: 1.5px dashed var(–border);
display: flex; flex-direction: column; align-items: center;
justify-content: center; gap: 2px;
color: var(–nezumi); font-size: 0.58rem;
background: var(–gofun); transition: all 0.15s;
font-family: ‘Noto Sans TC’, sans-serif;
}
.bg-upload-slot:hover { border-color: var(–kohaku); color: var(–kohaku); }
/* label input */
.label-row {
display: flex; align-items: center; gap: 8px;
font-size: 0.75rem;
}
.label-row label { color: var(–sumi2); flex-shrink: 0; }
.label-row input {
flex: 1; padding: 7px 10px; border-radius: 8px;
border: 1.5px solid var(–border); background: var(–gofun);
font-size: 0.75rem; font-family: ‘Noto Serif TC’, serif;
color: var(–sumi); outline: none;
transition: border 0.15s;
}
.label-row input:focus { border-color: var(–kohaku); background: #fff; }
/* empty hints */
.empty-hint {
font-size: 0.72rem; color: var(–nezumi);
text-align: center; padding: 8px 0; font-style: italic;
}
/* ═══════════════════════════════════
MODAL
═══════════════════════════════════ */
.modal-mask {
position: fixed; inset: 0; z-index: 200;
background: rgba(40,38,35,0.42); backdrop-filter: blur(6px);
display: flex; align-items: center; justify-content: center;
padding: 16px;
opacity: 0; pointer-events: none; transition: opacity 0.22s;
}
.modal-mask.open { opacity: 1; pointer-events: all; }
.modal-box {
background: var(–shiro); border-radius: var(–r2);
padding: 22px; width: 100%; max-width: 320px;
box-shadow: var(–shadow2);
transform: translateY(14px) scale(0.97);
transition: transform 0.22s;
border: 1px solid var(–border);
}
.modal-mask.open .modal-box { transform: none; }
.modal-box h3 {
font-family: ‘Noto Serif TC’, serif;
font-size: 0.9rem; margin-bottom: 14px; color: var(–sumi);
}
.modal-box label {
display: block; font-size: 0.68rem; color: var(–nezumi);
margin-bottom: 4px; margin-top: 11px; letter-spacing: 0.04em;
}
.modal-box input, .modal-box select {
width: 100%; padding: 9px 11px; border-radius: 9px;
border: 1.5px solid var(–border); background: var(–gofun);
font-size: 0.8rem; font-family: ‘Noto Sans TC’, sans-serif;
color: var(–sumi); outline: none; transition: border 0.15s;
}
.modal-box input:focus { border-color: var(–kohaku); background: #fff; }
.modal-btns { display: flex; gap: 8px; margin-top: 18px; }
.modal-btns button {
flex: 1; padding: 9px; border-radius: 30px;
border: 1px solid var(–border); cursor: pointer;
font-size: 0.75rem; font-family: ‘Noto Sans TC’, sans-serif;
transition: all 0.18s;
}
.m-cancel { background: transparent; color: var(–sumi2); }
.m-cancel:hover { background: var(–washi); }
.m-ok { background: var(–sumi); color: var(–shiro); border-color: var(–sumi); }
.m-ok:hover { background: var(–sumi2); }
/* ═══════════════════════════════════
TOAST
═══════════════════════════════════ */
.toast {
position: fixed; bottom: 28px; left: 50%;
transform: translateX(-50%) translateY(60px);
background: var(–sumi); color: var(–shiro);
padding: 9px 20px; border-radius: 30px;
font-size: 0.75rem; z-index: 300;
transition: transform 0.28s cubic-bezier(.34,1.56,.64,1);
pointer-events: none;
font-family: ‘Noto Serif TC’, serif;

  {bg:'#aab8a8',text:'#1e2e1c',name:'常磐'},
  {bg:'#b0bac4',text:'#1e2430',name:'錆青'},
  {bg:'#c4b8c0',text:'#2c1e28',name:'薄藤'},
  {bg:'#bec4b0',text:'#242e1e',name:'青白'},
];
// extra low-sat hues for auto-generate (HSL-based)
const AUTO_HUE_POOL = [15,30,45,60,80,100,130,160,180,200,220,240,260,280,300,320,340];
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}
function rgbToHsl(r,g,b) {
  r/=255; g/=255; b/=255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b);
  let h,s,l=(max+min)/2;
  if(max===min){h=s=0;}else{
    const d=max-min; s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;default:h=((r-g)/d+4)/6;}
  }
  return {h:h*360,s:s*100,l:l*100};
}
function hslToHex(h,s,l) {
  s/=100; l/=100;
  const a=s*Math.min(l,1-l);
  const f=n=>{const k=(n+h/30)%12;const c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*c).toString(16).padStart(2,'0');};
  return `#${f(0)}${f(8)}${f(4)}`;
}
function contrastColor(hex) {
  const {r,g,b}=hexToRgb(hex);
  return (r*299+g*587+b*114)/1000 > 145 ? '#2e2a20' : '#f5f2ec';
}
// returns a low-sat hex not yet used by existing courses
function autoPickHex() {
  const used = new Set(courses.map(c => c.colorHex));
  // try presets first
  for (const p of JP_PRESET) { if (!used.has(p.bg)) return p.bg; }
  // generate from hue pool
  for (const h of AUTO_HUE_POOL) {
    const hex = hslToHex(h, 22, 72);
    if (!used.has(hex)) return hex;
  }
  // fallback: random low-sat
  const h = Math.floor(Math.random()*360);
  return hslToHex(h, 18+Math.random()*18, 68+Math.random()*10);
}

function renderMain() {

function renderWeekStrip() {
  const strip = document.getElementById('weekStrip');
  const raw   = new Date().getDay();
  const todayIdx = raw === 0 ? 6 : raw - 1;
  strip.innerHTML = '';
  activeDays.forEach(di => {
    const chip = document.createElement('div');
    chip.className = 'week-chip' + (di === todayIdx ? ' today' : '');
    chip.innerHTML = `週${DAYS_ALL[di]}${di === todayIdx ? '<span class="today-dot"></span>' : ''}`;
    strip.appendChild(chip);
  });
}
function renderTT() {
  const table = document.getElementById('ttTable');
  const inPick = pickModeCourse !== null;
  const raw = new Date().getDay();
  const todayIdx = raw === 0 ? 6 : raw - 1;
  let html = '<thead><tr><th class="th-time"></th>';
  activeDays.forEach(di => {
    const isToday = di === todayIdx;
    html += `<th class="${isToday ? 'th-today' : ''}">${isToday ? `<span class="today-pill">週${DAYS_ALL[di]}</span>` : `週${DAYS_ALL[di]}`}</th>`;
  });
  html += '</tr></thead><tbody>';
  timeSlots.forEach((ts, si) => {
    html += '<tr>';
    html += `<td class="time-cell"><span class="t-period">${si+1}</span><span class="t-time">${ts.start}</span><span class="t-time">${ts.end}</span></td>`;
    activeDays.forEach(di => {
      const key   = `${di}-${si}`;
      const entry = schedule[key];
      if (entry) {
        const bg = entry.colorHex || '#c8b89a';
        const fg = contrastColor(bg);
        html += `<td class="slot filled" data-key="${key}">
          <div class="slot-inner" style="background:${bg};color:${fg}">
            <span class="slot-name">${entry.name}</span>
            ${entry.room ? `<span class="slot-room">${entry.room}</span>` : ''}
            <span class="slot-time-tag">${ts.start}–${ts.end}</span>
            <button class="slot-del" onclick="removeSlot('${key}')">✕</button>
          </div>
        </td>`;
      } else {
        html += `<td class="slot empty${inPick?' pick-mode':''}" data-di="${di}" data-si="${si}" onclick="slotClick(${di},${si})">
          <span class="slot-plus">＋</span>
        </td>`;
      }
    });
    html += '</tr>';
  });
  html += '</tbody>';
  table.innerHTML = html;
  // drag-drop
  table.querySelectorAll('td.slot.empty').forEach(td => {
    td.addEventListener('dragover', e => { e.preventDefault(); td.classList.add('drag-over'); });
    td.addEventListener('dragleave', () => td.classList.remove('drag-over'));
    td.addEventListener('drop', e => {
      e.preventDefault(); td.classList.remove('drag-over');
      if (dragCourseId != null)
        placeFromCourse(dragCourseId, parseInt(td.dataset.di), parseInt(td.dataset.si));
    });
  });
}

    if (e.courseId != null) placed[e.courseId] = (placed[e.courseId]||0) + 1;
  });
  // build chips: one per remaining slot
  const chips = [];
  courses.forEach(c => {
    const used = placed[c.id] || 0;
    const remaining = c.sessions - used;
    if (remaining > 0) chips.push({c, remaining});
  });
  count.textContent = chips.reduce((a,x)=>a+x.remaining, 0);
  grid.innerHTML = '';
  if (!chips.length) {
    grid.innerHTML = '<span class="unsched-empty">所有課程都已安排完畢 ✓</span>';
    return;
  }
  chips.forEach(({c, remaining}) => {
    const bg = c.colorHex || '#c8b89a';
    const fg = contrastColor(bg);
    const chip = document.createElement('div');
    chip.className = 'unsched-chip' + (pickModeCourse === c.id ? ' selected' : '');
    chip.style.background  = bg;
    chip.style.color       = fg;
    chip.innerHTML = `${c.name}${c.room?`<span style="font-size:0.65rem;opacity:.7;font-family:'DM Mono',monospace"> ${c.room}</span>`:''}
      <span class="chip-count">×${remaining}</span>`;
    chip.draggable = true;
    chip.addEventListener('dragstart', e => {
      dragCourseId = c.id; chip.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'copy';
    });
    chip.addEventListener('dragend', () => { dragCourseId = null; chip.classList.remove('dragging'); });
    chip.addEventListener('click', () => {
      if (pickModeCourse === c.id) { cancelPickMode(); return; }
      pickModeCourse = c.id;
      renderTT();
      renderUnscheduled();
      const banner = document.getElementById('pickBanner');
      banner.textContent = `點選課表格子放入「${c.name}」── 點此取消`;
      banner.classList.add('show');
    });
    grid.appendChild(chip);
  });
}

function slotClick(di, si) {
  if (pickModeCourse != null) {
    placeFromCourse(pickModeCourse, di, si);
    // check if more remaining; if none, cancel pick mode
    const used = Object.values(schedule).filter(e => e.courseId === pickModeCourse).length;
    const c    = courses.find(x => x.id === pickModeCourse);
    if (!c || used >= c.sessions) cancelPickMode();
    else { renderTT(); renderUnscheduled(); } // keep pick mode
    return;
  }
  openModal(di, si);
}
function placeFromCourse(courseId, di, si) {
  const c = courses.find(x => x.id === courseId);
  if (!c) return;
  schedule[`${di}-${si}`] = {name:c.name, room:c.room, colorHex:c.colorHex, courseId:c.id};
  toast(`「${c.name}」→ 週${DAYS_ALL[di]} 第${si+1}節`);
  renderTT(); renderUnscheduled();
}

/* time slots */
function renderTimeSlots() {
  const list = document.getElementById('timeSlotsList');
  list.innerHTML = '';
  timeSlots.forEach((ts, i) => {
    const row = document.createElement('div');
    row.className = 'time-row';
    row.innerHTML = `
      <span class="tr-period">${i+1}</span>
      <input type="time" value="${ts.start}" onchange="timeSlots[${i}].start=this.value;renderMain()">
      <span class="tr-sep">—</span>
      <input type="time" value="${ts.end}" onchange="timeSlots[${i}].end=this.value;renderMain()">
      <button class="tr-del" onclick="removeTimeSlot(${i})">✕</button>`;
    list.appendChild(row);
  });
}
function addTimeSlot() {
  const last = timeSlots[timeSlots.length - 1];
  const [h, m] = (last?.end || '17:00').split(':').map(Number);
  const fmt = v => String(v).padStart(2, '0');
  let sh = h, sm = m + 10;
  if (sm >= 60) { sh++; sm -= 60; }
  let eh = sh, em = sm + 50;
  if (em >= 60) { eh++; em -= 60; }
  timeSlots.push({start:`${fmt(sh)}:${fmt(sm)}`, end:`${fmt(eh)}:${fmt(em)}`});
  renderTimeSlots(); renderMain();
}
function removeTimeSlot(i) {
  if (timeSlots.length <= 1) { toast('至少保留一節'); return; }
  Object.keys(schedule).forEach(k => { if (k.split('-')[1] == i) delete schedule[k]; });
  // shift higher slot indices
  const newSched = {};
  Object.keys(schedule).forEach(k => {
    const [di, si] = k.split('-').map(Number);
    newSched[`${di}-${si > i ? si-1 : si}`] = schedule[k];
  });
  schedule = newSched;
  timeSlots.splice(i, 1);
  renderTimeSlots(); renderMain();
}

      } else {
        activeDays.push(i); activeDays.sort((a,b) => a-b);
      }
      renderDayToggle(); renderMain();
    };
    wrap.appendChild(btn);
  });
}

const SAVE_KEY   = 'jikanwari_v1';
const MY_ID_KEY  = 'jikanwari_myId';

let   guestSourceId = null; // the id we opened from URL
// ── localStorage helpers ──
function saveLocal() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      courses, schedule, activeDays, timeSlots,
      bgActive, appTitle,
      customBgUrl: customBgUrl ? customBgUrl.slice(0,500000) : null,
      myDocId: window._myDocId || null,
    }));
  } catch(e) {
    try { localStorage.setItem(SAVE_KEY, JSON.stringify({courses,schedule,activeDays,timeSlots,bgActive,appTitle,customBgUrl:null,myDocId:window._myDocId||null})); }
    catch(e2){}
  }
}
function loadLocal() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const d = JSON.parse(raw);
    if (d.courses)    courses    = d.courses;
    if (d.schedule)   schedule   = d.schedule;
    if (d.activeDays) activeDays = d.activeDays;
    if (d.timeSlots)  timeSlots  = d.timeSlots;
    if (d.bgActive!=null) bgActive = d.bgActive;
    if (d.appTitle)   appTitle   = d.appTitle;
    if (d.customBgUrl) customBgUrl = d.customBgUrl;
    if (d.myDocId)    window._myDocId = d.myDocId;
    return true;
  } catch(e){ return false; }
}
// ── build payload ──
function buildPayload() {
  return { courses, schedule, activeDays, timeSlots, bgActive, appTitle };
}
function applyPayload(d) {
  if (d.courses)    courses    = d.courses;
  if (d.schedule)   schedule   = d.schedule;
  if (d.activeDays) activeDays = d.activeDays;
  if (d.timeSlots)  timeSlots  = d.timeSlots;

function scheduleSave() {
  if (viewOnlyMode) return;
  saveLocal();
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(async () => {
    if (!window._fbReady || !window._myDocId) return;
    setSyncStatus('busy');

      await window._fbSave(buildPayload());

}

/* ════════════════════════════════
   BOOT
════════════════════════════════ */
async function boot() {
  // check URL for shared timetable id
  const params = new URLSearchParams(location.search);
  const sharedId = params.get('t');
  if (sharedId) {
    // someone opened a shared link
    const waitForFb = () => new Promise(res => {
      if (window._fbReady) return res();
      document.addEventListener('fb-ready', res, {once:true});
      setTimeout(res, 4000); // fallback
    });
    await waitForFb();
    const data = await window._fbLoad(sharedId);
    if (data) {
      applyPayload(data);
      // check if this is MY own doc
      const myId = localStorage.getItem(MY_ID_KEY) || (()=>{const s=localStorage.getItem(SAVE_KEY);try{return JSON.parse(s)?.myDocId;}catch{return null;}})();
      if (myId && myId === sharedId) {
        // it's my own link, just load normally
        window._myDocId = sharedId;
        applyBg(); document.getElementById('navTitle').textContent=appTitle;
        renderMain(); setSyncStatus('ok');
      } else {
        // someone else's
        showWelcome(data, sharedId);
      }
    } else {
      toast('找不到這份課表，已建立新課表');
      history.replaceState(null,'',location.pathname);
      bootFresh();
    }
    return;
  }
  // normal boot
  const hasSaved = loadLocal();
  if (hasSaved) {
    // try to reconnect to existing cloud doc
    if (window._myDocId && window._fbReady) {
      setSyncStatus('ok');
    } else if (window._myDocId) {
      document.addEventListener('fb-ready', ()=>setSyncStatus('ok'), {once:true});
    }
  } else {
    bootFresh();
  }
  applyBg();
  document.getElementById('navTitle').textContent = appTitle;
  renderMain();
  // create cloud doc if none yet
  if (!window._myDocId) {
    const waitFb = () => new Promise(res=>{
      if(window._fbReady) return res();
      document.addEventListener('fb-ready',res,{once:true});
      setTimeout(res,4000);
    });
    waitFb().then(()=>createMyDoc());
  }
}
function bootFresh() {
  const demo = [
    {name:'數學',room:'A101',hex:'#7394b0',sessions:4},

    {name:'歷史',room:'D301',hex:'#c4ad6e',sessions:2},

    {name:'音樂',room:'E102',hex:'#b5a8c8',sessions:1},
  ];
  demo.forEach(x=>courses.push({id:Date.now()+Math.random(),name:x.name,room:x.room,colorHex:x.hex,sessions:x.sessions}));
  const ids=courses.reduce((a,c)=>{a[c.name]=c.id;return a;},{});
  schedule={
    '0-0':{name:'數學',room:'A101',colorHex:'#7394b0',courseId:ids['數學']},
    '1-0':{name:'英文',room:'B203',colorHex:'#8faabf',courseId:ids['英文']},
    '2-0':{name:'物理',room:'C105',colorHex:'#8eaa8c',courseId:ids['物理']},
    '0-2':{name:'歷史',room:'D301',colorHex:'#c4ad6e',courseId:ids['歷史']},
    '3-1':{name:'體育',room:'操場',colorHex:'#b3c4b0',fffcourseId:ids['體育']},
    '4-3':{name:'音樂',room:'E102',colorHex:'#b5a8c8',courseId:ids['音樂']},
  };
}
